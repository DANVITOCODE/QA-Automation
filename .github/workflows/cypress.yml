name: Cypress Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * *'

jobs:
  cypress-run:
    name: ${{ matrix.suite }} tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: login
            spec: 'cypress/e2e/login/**'
          - suite: demoqa
            spec: 'cypress/e2e/demoqa/**'
          - suite: ecommerce
            spec: 'cypress/e2e/ecommerce/**'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress — ${{ matrix.suite }}
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          headed: false
          spec: ${{ matrix.suite == 'login' && 'cypress/e2e/login/**' || matrix.suite == 'demoqa' && 'cypress/e2e/demoqa/**' || 'cypress/e2e/ecommerce/**' }}
        env:
          CYPRESS_ORANGEHRM_USER: ${{ secrets.ORANGEHRM_USER }}
          CYPRESS_ORANGEHRM_PASS: ${{ secrets.ORANGEHRM_PASS }}
          CYPRESS_ECOMMERCE_USER: ${{ secrets.ECOMMERCE_USER }}
          CYPRESS_ECOMMERCE_PASS: ${{ secrets.ECOMMERCE_PASS }}

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-${{ matrix.suite }}
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos-${{ matrix.suite }}
          path: cypress/videos
          if-no-files-found: ignore

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-reports-${{ matrix.suite }}
          path: cypress/reports
          if-no-files-found: ignore
